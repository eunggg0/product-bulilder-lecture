<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0B4FES1V9K"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0B4FES1V9K');
  </script>
  <meta name="robots" content="noindex, follow">
  <title>페이지를 찾을 수 없어요 - 오늘의 픽</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎲</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    .error-container {
      max-width: 600px;
      margin: 80px auto;
      padding: 0 20px;
      text-align: center;
    }
    .error-emoji { font-size: 6rem; margin-bottom: 24px; }
    .error-code { font-size: 6rem; font-weight: 900; color: var(--primary); line-height: 1; margin-bottom: 16px; }
    .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; color: var(--text); }
    .error-desc { color: var(--text-muted); margin-bottom: 36px; line-height: 1.7; }
    .error-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a class="logo" href="index.html">🎲 오늘의 픽</a>
      <nav id="mainNav">
        <a href="index.html">홈</a>
        <a href="list.html">전체목록</a>
        <a href="about.html">소개</a>
        <a href="contact.html">문의</a>
        <a href="privacy.html">개인정보처리방침</a>
        <button class="dark-toggle" id="darkToggle" onclick="toggleDark()" title="다크모드 전환">🌙</button>
      </nav>
      <button class="hamburger" onclick="toggleMenu()" title="메뉴">☰</button>
    </div>
  </header>

  <div class="error-container">
    <div class="error-emoji">🎲</div>
    <div class="error-code">404</div>
    <h1 class="error-title">페이지를 찾을 수 없어요!</h1>
    <p class="error-desc">
      찾으시는 페이지가 없거나 주소가 잘못됐어요.<br>
      대신 오늘의 랜덤 추천을 받아보는 건 어떨까요?
    </p>
    <div class="error-btns">
      <a href="index.html" class="btn-pick" style="text-decoration:none; padding: 14px 32px; border-radius: 50px; background: linear-gradient(135deg, #6c63ff, #ff6584); color: #fff; font-weight: 800; font-size: 1rem;">
        🏠 홈으로 돌아가기
      </a>
      <a href="index.html" class="btn-share" style="text-decoration:none; padding: 14px 24px; border-radius: 50px; border: 2px solid #6c63ff; color: #6c63ff; font-weight: 700; font-size: 0.95rem;">
        🎲 오늘의 픽 받기
      </a>
    </div>
  </div>

  <footer>
    <div class="footer-inner">
      <p>© 2026 오늘의 픽 | <a href="privacy.html">개인정보처리방침</a> | <a href="about.html">소개</a></p>
    </div>
  </footer>

  <script>
    function toggleDark() {
      const isDark = document.body.classList.toggle("dark");
      document.getElementById("darkToggle").textContent = isDark ? "☀️" : "🌙";
      localStorage.setItem("darkMode", isDark ? "on" : "off");
    }
    const savedMode = localStorage.getItem("darkMode");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    if (savedMode === "on" || (savedMode === null && prefersDark)) {
      document.body.classList.add("dark");
      document.getElementById("darkToggle").textContent = "☀️";
    }
    window.matchMedia("(prefers-color-scheme: dark)").addEventListener("change", e => {
      if (localStorage.getItem("darkMode") === null) {
        document.body.classList.toggle("dark", e.matches);
        document.getElementById("darkToggle").textContent = e.matches ? "☀️" : "🌙";
      }
    });
    function toggleMenu() {
      document.getElementById("mainNav").classList.toggle("open");
    }
  </script>
</body>
</html>
