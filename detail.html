  <style>
    .back-link {
      max-width: 900px;
      margin: 20px auto 0;
      padding: 0 20px;
    }
    .back-link a {
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
    }
    .back-link a:hover { color: var(--primary); text-decoration: none; }

    .detail-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 20px 60px;
    }

    .detail-hero {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      gap: 32px;
      align-items: flex-start;
      margin-bottom: 24px;
    }

    .detail-poster {
      font-size: 6rem;
      min-width: 120px;
      text-align: center;
      line-height: 1.2;
    }

    .detail-header { flex: 1; }

    .detail-header h1 {
      font-size: 2rem;
      font-weight: 800;
      margin: 12px 0 10px;
      color: var(--text);
    }

    .detail-body {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }

    .detail-body h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 14px;
      color: var(--text);
    }

    .detail-body p {
      color: #555;
      line-height: 1.8;
      font-size: 1rem;
    }

    .detail-platform {
      background: var(--bg);
      border-radius: 12px;
      padding: 16px 20px;
      margin-top: 20px;
      border: 1px solid var(--border);
    }

    .detail-platform h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--text);
    }

    .detail-platform p {
      color: var(--primary);
      font-weight: 700;
    }

    .detail-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .related-section { margin-top: 10px; }

    .related-section h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text);
    }

    .related-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .related-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .related-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .related-card .r-emoji { font-size: 2.5rem; margin-bottom: 8px; }
    .related-card .r-title { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
    .related-card .r-meta { font-size: 0.8rem; color: var(--text-muted); }

    .not-found {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .not-found h2 { font-size: 1.5rem; margin-bottom: 12px; }

    @media (max-width: 600px) {
      .detail-hero { flex-direction: column; align-items: center; text-align: center; padding: 24px; }
      .detail-poster { font-size: 4rem; min-width: auto; }
      .card-tags { justify-content: center; }
      .related-list { grid-template-columns: 1fr; }
      .detail-actions { flex-direction: column; }
    }
  </style>
</head>

      </nav>
      <button class="hamburger" onclick="toggleMenu()" title="메뉴">☰</button>
    </div>
  </header>

  <!-- 상단 광고 -->

  <footer>

      <p class="footer-desc">매일 새로운 영화, 드라마, 애니, 책, 게임을 추천해드립니다.</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="detail.js"></script>
</body>
</html>
